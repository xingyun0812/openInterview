services:
  mysql:
    image: mysql:8.0
    container_name: openinterview-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: interview_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - openinterview

  redis:
    image: redis:7
    container_name: openinterview-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - openinterview

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: openinterview-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - openinterview

  minio:
    image: minio/minio:latest
    container_name: openinterview-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - openinterview

  backend:
    build:
      context: ./backend
    container_name: openinterview-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/interview_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
      DB_USER: root
      DB_PASS: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: 123456
      OPENINTERVIEW_SECURITY_PERMIT_ALL: "true"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - openinterview

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: openinterview-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_started
    networks:
      - openinterview

  # TODO(#33): 用前端构建产物替换该占位服务（建议用 nginx 静态托管 dist/）
  frontend:
    image: nginx:alpine
    container_name: openinterview-frontend
    ports:
      - "5173:80"
    networks:
      - openinterview

networks:
  openinterview:
    name: openinterview

volumes:
  mysql_data:
  minio_data:
  prometheus_data:

