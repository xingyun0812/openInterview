name: Issue Evidence Check

on:
  issue_comment:
    types: [created]

jobs:
  check-evidence-comment:
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, 'PR:') &&
      contains(github.event.comment.body, '测试') &&
      contains(github.event.comment.body, '风险')
    runs-on: ubuntu-latest
    steps:
      - name: Mark comment format as valid
        run: |
          echo "Issue evidence comment detected and format looks valid."
