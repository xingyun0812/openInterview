name: PR Gate

on:
  pull_request:
    branches: [ "main" ]

jobs:
  changed-files-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block build artifacts
        shell: bash
        run: |
          set -euo pipefail
          files="$(git diff --name-only origin/${{ github.base_ref }}...HEAD || true)"
          echo "$files"
          if echo "$files" | grep -E '^backend/target/' >/dev/null 2>&1; then
            echo "Detected forbidden files under backend/target/"
            exit 1
          fi

  backend-test:
    runs-on: ubuntu-latest
    needs: changed-files-sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Detect backend changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          files="$(git diff --name-only origin/${{ github.base_ref }}...HEAD || true)"
          if echo "$files" | grep -E '^backend/' >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run backend tests
        if: steps.detect.outputs.changed == 'true'
        working-directory: backend
        run: mvn test

      - name: Skip when backend unchanged
        if: steps.detect.outputs.changed != 'true'
        run: echo "No backend changes detected; skip backend tests."
