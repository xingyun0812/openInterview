name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-code-review:
    name: claude-code-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Claude configuration
        id: cfg
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${ANTHROPIC_API_KEY}" ] || [ -n "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (Claude not configured)
        if: steps.cfg.outputs.enabled != 'true'
        run: |
          echo "Claude not configured (missing ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN). Skip review."

      - name: Claude Code Action PR review
        if: steps.cfg.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            你是资深代码审查员。请基于本 PR 变更做审查，输出：
            - Summary（1-3条）
            - Must fix（阻塞项）
            - Should fix（非阻塞）
            - Risks
            - Test plan

            重点关注：
            1) 幂等头 X-Idempotency-Key 是否覆盖所有写接口
            2) 状态机非法流转是否拒绝并留痕
            3) traceId + bizCode + errorCode 是否全链路透传
            4) MQ/Webhook 事件命名映射是否一致（契约基线）
            5) 是否补齐测试证据（mvn test / 回归 / 证据包）

