server:
  port: 8080

spring:
  application:
    name: interview-backend
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123456
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/interview_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

event:
  bridge:
    mq-enabled: false
    webhook-enabled: false
    exchange: interview.direct
    webhook-url: http://localhost:8080/webhook/mock/receive

logging:
  level:
    root: INFO

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

resume:
  parse:
    retry:
      backoff-ms: 200,500,1000
