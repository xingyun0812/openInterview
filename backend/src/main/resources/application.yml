server:
  port: 8080

spring:
  application:
    name: interview-backend
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:2s}
  autoconfigure:
    # Spring AI OpenAI starter 会在无 key 时直接 fail-fast，默认我们必须可离线运行，所以先禁用其自动装配。
    # 当后续要启用真实 OpenAI 调用时，应改为“按 ai.provider=openai 且 key 存在时再显式装配所需 Bean”。
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123456
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/interview_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

event:
  bridge:
    mq-enabled: false
    webhook-enabled: false
    exchange: interview.direct
    webhook-url: http://localhost:8080/webhook/mock/receive

logging:
  level:
    root: INFO

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:openinterview-jwt-secret-key-must-be-at-least-256-bits}
  expiration-ms: ${JWT_EXPIRATION:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:86400000}

openinterview:
  security:
    permit-all: ${OPENINTERVIEW_SECURITY_PERMIT_ALL:false}
  redis:
    enabled: ${OPENINTERVIEW_REDIS_ENABLED:true}
  idempotency:
    ttl-seconds: ${OPENINTERVIEW_IDEMPOTENCY_TTL_SECONDS:300}

resume:
  parse:
    retry:
      backoff-ms: 200,500,1000

# Phase2-07 真实导出本地暂存目录（相对运行目录，一般为 backend/）
export:
  storage-dir: exports

# Phase2-09 AI 适配层（默认 mock，确保无外部依赖）
ai:
  enabled: true
  provider: mock
  openai:
    api-key: ${OPENAI_API_KEY:}
