groups:
  - name: openInterview.backend
    rules:
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m]))) > 0.01
        for: 10m
        labels:
          severity: P1
        annotations:
          summary: "Backend 5xx error rate > 1%"
          description: "5xx error rate exceeded 1% for 10 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 0.8
        for: 10m
        labels:
          severity: P1
        annotations:
          summary: "Backend P95 latency > 800ms"
          description: "P95 latency exceeded 800ms for 10 minutes."

